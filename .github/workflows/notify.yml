# ============================================================
# IQRA — Notification Sender (timezone-aware)
#
# Runs every hour. Checks each subscriber's local time.
# Sends notifications to subscribers for whom it's the
# correct local hour — regardless of their timezone.
#
# Default times (user-local):
#   08:00 daily      — Ayah of the Day
#   08:00 Friday     — Al-Kahf (+ Ayah of the Day)
#   21:30 daily      — Nightly Al-Mulk
#
# Migration: swap Gist calls for Cloudflare KV when ready.
# ============================================================

name: Send Iqra Notifications

on:
  schedule:
    - cron: '0 * * * *'   # Every hour — checks each subscriber's local time
  workflow_dispatch:
    inputs:
      type:
        description: 'Force send: aotd / kahf / mulk / test'
        default: 'test'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Web Push Notifications
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:     ${{ secrets.VAPID_SUBJECT }}
          GIST_TOKEN:        ${{ secrets.GIST_TOKEN }}
          GIST_ID:           ${{ secrets.GIST_ID }}
          MANUAL_TYPE:       ${{ github.event.inputs.type }}
        run: |
          pip install pywebpush requests --quiet
          python3 << 'PYEOF'
          import os, json, requests, random, time
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo, ZoneInfoNotFoundError
          from pywebpush import webpush, WebPushException

          VAPID_PRIVATE_KEY = os.environ['VAPID_PRIVATE_KEY']
          VAPID_SUBJECT     = os.environ.get('VAPID_SUBJECT', 'mailto:iqra@example.com')
          GIST_TOKEN        = os.environ['GIST_TOKEN']
          GIST_ID           = os.environ['GIST_ID']
          MANUAL_TYPE = os.environ.get('MANUAL_TYPE', '').strip()
          # If manually triggered without a type, default to test
          import sys
          is_manual = os.environ.get('GITHUB_EVENT_NAME', '') == 'workflow_dispatch'
          if is_manual and not MANUAL_TYPE:
            MANUAL_TYPE = 'test'

          now_utc = datetime.now(timezone.utc)
          print(f'UTC time: {now_utc.isoformat()}')

          # ── Surah lengths ──────────────────────────────────
          SURAHS = [
            (1,7),(2,286),(3,200),(4,176),(5,120),(6,165),(7,206),
            (8,75),(9,129),(10,109),(11,123),(12,111),(13,43),(14,52),
            (15,99),(16,128),(17,111),(18,110),(19,98),(20,135),(21,112),
            (22,78),(23,118),(24,64),(25,77),(26,227),(27,93),(28,88),
            (29,69),(30,60),(31,34),(32,30),(33,73),(34,54),(35,45),
            (36,83),(37,182),(38,88),(39,75),(40,85),(41,54),(42,53),
            (43,89),(44,59),(45,37),(46,35),(47,38),(48,29),(49,18),
            (50,45),(51,60),(52,49),(53,62),(54,55),(55,78),(56,96),
            (57,29),(58,22),(59,24),(60,13),(61,14),(62,11),(63,11),
            (64,18),(65,12),(66,12),(67,30),(68,52),(69,52),(70,44),
            (71,28),(72,28),(73,20),(74,56),(75,40),(76,31),(77,50),
            (78,40),(79,46),(80,42),(81,29),(82,19),(83,36),(84,25),
            (85,22),(86,17),(87,19),(88,26),(89,30),(90,20),(91,15),
            (92,21),(93,11),(94,8),(95,8),(96,19),(97,5),(98,8),
            (99,8),(100,11),(101,11),(102,8),(103,3),(104,9),(105,5),
            (106,4),(107,7),(108,3),(109,6),(110,3),(111,5),(112,4),
            (113,5),(114,6)
          ]

          _aotd_cache = {}

          def fetch_ayah_payload():
            sn, ac = random.choice(SURAHS)
            an = random.randint(1, ac)
            try:
              r = requests.get(
                f'https://api.alquran.cloud/v1/ayah/{sn}:{an}/en.sahih',
                timeout=10
              )
              d = r.json()['data']
              body = d['text'][:100] + '…' if len(d['text']) > 100 else d['text']
              name = d['surah']['englishName']
            except:
              body, name = f'Ayah {an}', f'Surah {sn}'
            return {
              'title':     'Ayah of the Day 🌅',
              'body':      f'{name} · Ayah {an}\n{body}',
              'notifType': 'aotd',
              'surah':     sn,
              'ayah':      an,
            }

          KAHF_PAYLOAD = {
            'title':     "It's Jumu'ah 🕌",
            'body':      'Time for Surah Al-Kahf — tap to begin',
            'notifType': 'kahf', 'surah': 18, 'ayah': 1,
          }
          MULK_PAYLOAD = {
            'title':     'Before You Sleep 🌙',
            'body':      'Recite Surah Al-Mulk — protector of the grave',
            'notifType': 'mulk', 'surah': 67, 'ayah': 1,
          }
          TEST_PAYLOAD = {
            'title':     'Iqra Test ✓',
            'body':      'Web Push is working!',
            'notifType': 'test', 'surah': 1, 'ayah': 1,
          }

          def get_local_time(tz_str):
            """Get current local time for a timezone string."""
            try:
              tz = ZoneInfo(tz_str)
              return datetime.now(tz)
            except (ZoneInfoNotFoundError, Exception):
              # Fallback to UTC if timezone is invalid
              return now_utc

          def get_payloads_for_subscriber(sub):
            """Return list of payloads to send based on subscriber's local time."""
            if MANUAL_TYPE:
              if MANUAL_TYPE == 'test':  return [TEST_PAYLOAD]
              if MANUAL_TYPE == 'aotd':  return [fetch_ayah_payload()]
              if MANUAL_TYPE == 'kahf':  return [KAHF_PAYLOAD]
              if MANUAL_TYPE == 'mulk':  return [MULK_PAYLOAD]
              return []

            tz_str  = sub.get('timezone', 'UTC')
            local   = get_local_time(tz_str)
            h, m    = local.hour, local.minute
            weekday = local.weekday()  # 0=Mon, 4=Fri

            payloads = []

            # 08:00 local — Ayah of the Day (and Al-Kahf on Fridays)
            if h == 8 and m < 60:
              if weekday == 4:
                payloads.append(KAHF_PAYLOAD)
              # Always send Ayah of the Day at 8am
              # Use cached payload so all subscribers get same ayah
              tz_key = tz_str
              if tz_key not in _aotd_cache:
                _aotd_cache[tz_key] = fetch_ayah_payload()
              payloads.append(_aotd_cache[tz_key])

            # 21:30 local — Nightly Al-Mulk
            if h == 21 and m >= 30:
              payloads.append(MULK_PAYLOAD)

            return payloads

          # ── Fetch subscriptions from Gist ──────────────────
          headers = {
            'Authorization': f'token {GIST_TOKEN}',
            'Accept': 'application/vnd.github.v3+json'
          }
          r = requests.get(
            f'https://api.github.com/gists/{GIST_ID}',
            headers=headers, timeout=10
          )
          gist = r.json()
          subs_raw = gist.get('files', {}).get('subscriptions.json', {}).get('content', '[]')
          subscriptions = json.loads(subs_raw)

          if not subscriptions:
            print('No subscriptions — nothing to send')
            exit(0)

          print(f'Checking {len(subscriptions)} subscriber(s)')

          # ── Send to each subscriber ────────────────────────
          stale = []
          total_sent = 0

          for sub in subscriptions:
            payloads = get_payloads_for_subscriber(sub)
            if not payloads:
              tz = sub.get('timezone', 'UTC')
              local = get_local_time(tz)
              print(f'  Skip {tz} — local time {local.strftime("%H:%M")} (not a send time)')
              continue

            tz = sub.get('timezone', 'UTC')
            local = get_local_time(tz)
            print(f'  Sending {len(payloads)} notification(s) to {tz} ({local.strftime("%H:%M")})')

            for i, payload in enumerate(payloads):
              if i > 0: time.sleep(2)
              try:
                # Normalize keys to URL-safe base64 (strip padding, fix + and /)
              def to_urlsafe(s):
                return s.replace('+', '-').replace('/', '_').rstrip('=')

              webpush(
                  subscription_info={
                    'endpoint': sub['endpoint'],
                    'keys': {
                      'p256dh': to_urlsafe(sub['keys']['p256dh']),
                      'auth':   to_urlsafe(sub['keys']['auth']),
                    }
                  },
                  data=json.dumps(payload),
                  vapid_private_key=VAPID_PRIVATE_KEY,
                  vapid_claims={'sub': VAPID_SUBJECT},
                )
                total_sent += 1
                print(f'    ✓ {payload["title"]}')
              except WebPushException as e:
                if e.response and e.response.status_code in [404, 410]:
                  if sub['endpoint'] not in stale:
                    stale.append(sub['endpoint'])
                  print(f'    ✗ Stale subscription')
                else:
                  print(f'    ✗ Failed: {e}')

          print(f'\nTotal sent: {total_sent}')

          # ── Clean stale subscriptions ──────────────────────
          if stale:
            clean = [s for s in subscriptions if s['endpoint'] not in stale]
            requests.patch(
              f'https://api.github.com/gists/{GIST_ID}',
              headers={**headers, 'Content-Type': 'application/json'},
              json={'files': {'subscriptions.json': {'content': json.dumps(clean, indent=2)}}},
              timeout=10,
            )
            print(f'Cleaned {len(stale)} stale subscription(s)')

          print('Done.')
          PYEOF
